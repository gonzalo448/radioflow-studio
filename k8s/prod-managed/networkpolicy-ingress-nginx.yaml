apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: radioflow-default-deny
  namespace: radioflow
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: radioflow-allow-dns-egress
  namespace: radioflow
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: radioflow-allow-ingress-from-ingress-nginx
  namespace: radioflow
spec:
  podSelector:
    matchLabels:
      app: radioflow-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: radioflow-allow-api-egress-to-managed-services
  namespace: radioflow
spec:
  podSelector:
    matchLabels:
      app: radioflow-api
  policyTypes:
    - Egress
  egress:
    # NetworkPolicy estándar no filtra por FQDN; se permite por puerto.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6380
        - protocol: TCP
          port: 443
