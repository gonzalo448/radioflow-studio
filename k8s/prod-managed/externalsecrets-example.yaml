### EJEMPLO (requiere External Secrets Operator)
### https://external-secrets.io/
###
### Este archivo es un template. Debes ajustar:
### - SecretStore/ClusterSecretStore según tu backend (Vault, AWS, Azure Key Vault, etc.)
### - remoteRef.key según tu convención
###
### Resultado: crea el Secret `radioflow-secrets` en el namespace `radioflow`
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: radioflow-secrets
  namespace: radioflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: radioflow-secretstore
  target:
    name: radioflow-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: radioflow/DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: radioflow/REDIS_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: radioflow/JWT_SECRET

