apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: radioflow
spec:
  clusterIP: None
  selector:
    app: radioflow-postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: radioflow-postgres
  namespace: radioflow
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: radioflow-postgres
  template:
    metadata:
      labels:
        app: radioflow-postgres
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: radioflow
            - name: POSTGRES_DB
              value: radioflow
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: radioflow-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U radioflow -d radioflow"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U radioflow -d radioflow"]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

