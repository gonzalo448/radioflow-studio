apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radioflow-media-pvc
  namespace: radioflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: radioflow
spec:
  selector:
    app: radioflow-api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radioflow-api
  namespace: radioflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: radioflow-api
  template:
    metadata:
      labels:
        app: radioflow-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: radioflow-studio-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: radioflow-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://radioflow:$(POSTGRES_PASSWORD)@postgres:5432/radioflow"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: radioflow-secrets
                  key: JWT_SECRET
            - name: CORS_ORIGIN
              value: "none"
            - name: CORS_CREDENTIALS
              value: "true"
            - name: BODY_LIMIT_BYTES
              value: "1048576"
            - name: MEDIA_ROOT
              value: /app/media
            - name: REDIS_URL
              value: redis://redis:6379
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          volumeMounts:
            - name: media
              mountPath: /app/media
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: radioflow-media-pvc

