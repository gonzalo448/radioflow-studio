apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radioflow-postgres-pvc
  namespace: radioflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radioflow-postgres
  namespace: radioflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radioflow-postgres
  template:
    metadata:
      labels:
        app: radioflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: radioflow
            - name: POSTGRES_DB
              value: radioflow
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: radioflow-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U radioflow -d radioflow"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U radioflow -d radioflow"]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: radioflow-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: radioflow
spec:
  selector:
    app: radioflow-postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432

