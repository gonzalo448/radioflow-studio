# Plantilla producción: HTTP → HTTPS + PWA + API (Fastify) + proxy opcional a Icecast.
# Uso:
#   1) Copiá este archivo a ../conf.d/radioflow-https.conf (y quitá o renombrá radioflow.conf si usabas solo HTTP).
#   2) Reemplazá radioflow.example.com por tu FQDN.
#   3) Colocá fullchain.pem y privkey.pem en docker/nginx/tls/ (ver tls/README.md).
#   4) Combiná docker-compose.edge.prod.yml + docker-compose.edge.tls.yml (puerto 443 y volumen de certs).
#
# Upstream: el servicio de la API en Compose se llama "api", no "backend".

# Forzar redirección HTTP → HTTPS
server {
    listen 80;
    server_name radioflow.example.com;
    return 301 https://$host$request_uri;
}

# Servidor HTTPS
server {
    listen 443 ssl http2;
    server_name radioflow.example.com;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/radioflow_access.log;
    error_log  /var/log/nginx/radioflow_error.log;

    root /usr/share/nginx/html;
    index index.html;

    # API (Fastify)
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 64m;
    }

    # WebSocket estación (no mezclar con el bloque general /api/)
    location /api/ws/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    # Proxy hacia Icecast (mismo mount /stream que el encoder típico).
    # Requiere servicio "icecast" en la misma red Docker (perfil broadcast en compose).
    location /stream {
        proxy_pass http://icecast:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
