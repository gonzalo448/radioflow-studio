# Gateway HTTP: estáticos de la PWA + proxy a la API Fastify.
# Montaje: /etc/nginx/conf.d (ver docker-compose.edge*.yml).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API (mismo host que el panel → no hace falta VITE_API_ORIGIN en el build)
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 64m;
    }

    # WebSocket estación (misma ruta que en dev con proxy de Vite)
    location /api/ws/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# TLS en producción: plantilla lista en docker/nginx/templates/radioflow-https.conf
# y overlay docker-compose.edge.tls.yml (montaje ./docker/nginx/tls).
