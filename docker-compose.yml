services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: radioflow
      POSTGRES_PASSWORD: radioflow_dev
      POSTGRES_DB: radioflow
    ports:
      - "5432:5432"
    volumes:
      - radioflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radioflow -d radioflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - radioflow_redis:/data

  # Ollama para curaduría semántica local (Fase 6). Descomenta cuando lo necesites.
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  # Perfil opcional: worker de parrilla — la API debe estar en el host (p. ej. :4000).
  schedule-worker:
    profiles: ["workers"]
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      RADIOFLOW_API_URL: http://host.docker.internal:4000
      RADIOFLOW_TOKEN: ${RADIOFLOW_TOKEN:-}
      SCHEDULE_POLL_MS: "20000"
    command: ["sh", "-c", "npm install && npm run start -w @radioflow/schedule-worker"]
    restart: unless-stopped

volumes:
  radioflow_pg:
  radioflow_redis:
