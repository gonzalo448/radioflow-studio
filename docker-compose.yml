services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: radioflow
      POSTGRES_PASSWORD: radioflow_dev
      POSTGRES_DB: radioflow
    ports:
      - "5432:5432"
    volumes:
      - radioflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radioflow -d radioflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - radioflow_redis:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://radioflow:radioflow_dev@postgres:5432/radioflow
      JWT_SECRET: ${JWT_SECRET:-desarrollo-cambiar-minimo-32-caracteres-radioflow}
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173
      MEDIA_ROOT: /app/media
    volumes:
      - radioflow_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "cd /app/apps/api && npx prisma migrate deploy && node dist/index.js",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # Ollama para curaduría semántica local (Fase 6). Descomenta cuando lo necesites.
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  # Icecast 2 de prueba (encoder → icecast://source:PASS@127.0.0.1:8000/stream).
  icecast:
    profiles: ["broadcast"]
    image: infiniteproject/icecast:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:-radioflow_dev}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:-radioflow_admin_dev}
      ICECAST_RELAY_PASSWORD: ${ICECAST_RELAY_PASSWORD:-radioflow_relay_dev}

  # Perfil opcional: worker de parrilla — la API debe estar en el host (p. ej. :4000).
  schedule-worker:
    profiles: ["workers"]
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      # Con el servicio `api` en este mismo compose, usa http://api:4000
      RADIOFLOW_API_URL: ${RADIOFLOW_API_URL:-http://api:4000}
      RADIOFLOW_TOKEN: ${RADIOFLOW_TOKEN:-}
      SCHEDULE_POLL_MS: "20000"
    command: ["sh", "-c", "npm install && npm run start -w @radioflow/schedule-worker"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  radioflow_pg:
  radioflow_redis:
  radioflow_media:
