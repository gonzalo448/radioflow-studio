name: CI

on:
  push:
    branches: [main, master, "cursor/**"]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: radioflow
          POSTGRES_PASSWORD: radioflow_dev
          POSTGRES_DB: radioflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U radioflow -d radioflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://radioflow:radioflow_dev@localhost:5432/radioflow
      JWT_SECRET: ci-smoke-jwt-secret-32-chars-minimum-x
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test
      MEDIA_ROOT: data/media/ci
      SMOKE_PROMOTE_TO_EDITOR: "1"
      RATE_LIMIT_AUTH_MAX: "8"
      RATE_LIMIT_AUTH_WINDOW_SEC: "300"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: npm audit (0 critical)
        run: node scripts/ci-verify-npm-audit.mjs

      - name: npm audit production (0 critical/high)
        run: node scripts/ci-verify-npm-audit.mjs
        env:
          NPM_AUDIT_OMIT_DEV: "1"
          NPM_AUDIT_MAX_HIGH: "0"

      - name: Check UTF-8
        run: npm run check:utf8

      - name: Verify JWT secret policy (prod)
        run: node scripts/ci-verify-jwt-secret.mjs
        env:
          NODE_ENV: production
          JWT_SECRET: ci-smoke-jwt-secret-32-chars-minimum-x

      - name: Verify weak JWT fails in prod
        run: |
          set +e
          NODE_ENV=production JWT_SECRET=short node scripts/ci-verify-jwt-secret.mjs
          test $? -ne 0

      - name: Build shared
        run: npm run build -w @radioflow/shared

      - name: Generate Prisma clients
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://radioflow:radioflow_dev@localhost:5432/radioflow
        run: |
          npx prisma generate
          DATABASE_URL="file:./.ci-standalone-generate.db" npx prisma generate --schema=prisma/standalone/schema.prisma

      - name: Typecheck & build API
        run: npm run build -w @radioflow/api

      - name: Build web
        run: npm run build -w @radioflow/web

      - name: Unit tests (B4 skip / AutoDJ / EOF)
        run: npm run test:unit

      - name: Migrate DB, verify schema, smoke API y E2E (Playwright)
        run: |
          set -euo pipefail
          set -m
          cd apps/api
          npx prisma migrate deploy
          node scripts/ci-verify-migrate.mjs
          cd ../..
          ( cd apps/api && node dist/index.js ) &
          API_PID=$!
          ( cd apps/web && VITE_ALLOW_WEB_PANEL=true npx vite --host 127.0.0.1 --port 5173 --strictPort ) &
          WEB_PID=$!
          cleanup() {
            kill -TERM -"$WEB_PID" 2>/dev/null || true
            kill -TERM -"$API_PID" 2>/dev/null || true
            wait "$WEB_PID" 2>/dev/null || true
            wait "$API_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:4000/api/health/ready >/dev/null; then
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "API no respondió a /api/health/ready a tiempo"
              exit 1
            fi
            sleep 1
          done
          npx wait-on -t 120000 tcp:127.0.0.1:5173
          SMOKE_RATE_LIMIT_PROBE=1 SMOKE_EXPECT_AUTH_MAX=8 node scripts/smoke-api.mjs
          npx playwright install chromium --with-deps
          CI=true npm run test:e2e

  # A5: FFmpeg → Icecast (bytes en /stream) + mock PlaySegment filters.
  smoke-broadcast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Smoke broadcast (mock, sin Icecast)
        run: npm run smoke:broadcast:mock

      - name: Start Icecast (perfil broadcast)
        run: docker compose --profile broadcast up -d icecast

      - name: Esperar Icecast :8000
        run: |
          set -e
          for i in $(seq 1 40); do
            if curl -sf --max-time 3 http://127.0.0.1:8000/ >/dev/null; then
              echo "Icecast accesible en http://127.0.0.1:8000"
              exit 0
            fi
            sleep 2
          done
          echo "Icecast no respondió a tiempo"
          exit 1

      - name: Smoke broadcast (FFmpeg → Icecast /stream)
        env:
          SMOKE_BROADCAST_MODE: icecast
          SMOKE_ICECAST_HOST: 127.0.0.1
          SMOKE_ICECAST_PORT: "8000"
          SMOKE_ICECAST_PASSWORD: radioflow_dev
          SMOKE_ICECAST_MOUNT: /stream
        run: npm run smoke:broadcast

      - name: Detener Icecast
        if: always()
        run: docker compose --profile broadcast down

  # A6: integridad backup desktop (manifiesto SHA-256 + HMAC) sin tocar userData real.
  backup-desktop-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Desktop backup/restore selftest
        run: npm run backup:desktop:selftest
