name: CI

on:
  push:
    branches: [main, master, "cursor/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build shared
        run: npm run build -w @radioflow/shared

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Typecheck & build API
        run: npm run build -w @radioflow/api

      - name: Build web
        run: npm run build -w @radioflow/web
